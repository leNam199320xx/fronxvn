<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Visual Editor</title>
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <div class="editor-layout">
        <!-- Toolbar -->
        <div class="editor-toolbar">
            <div class="toolbar-group">
                <button id="btn-undo" title="Undo (Ctrl+Z)">↶</button>
                <button id="btn-redo" title="Redo (Ctrl+Shift+Z)">↷</button>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <button id="btn-zoom-out" title="Zoom Out">−</button>
                <span class="zoom-display" id="zoom-display">100%</span>
                <button id="btn-zoom-in" title="Zoom In">+</button>
                <button id="btn-zoom-reset" title="Reset Zoom">⟲</button>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <button id="btn-toggle-grid" title="Toggle Grid" class="active">Grid</button>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <button id="btn-align-left" title="Align Left">⫷</button>
                <button id="btn-align-center" title="Align Center H">⫿</button>
                <button id="btn-align-right" title="Align Right">⫸</button>
                <button id="btn-align-top" title="Align Top">⊤</button>
                <button id="btn-align-middle" title="Align Middle V">⊶</button>
                <button id="btn-align-bottom" title="Align Bottom">⊥</button>
                <button id="btn-full-width" title="Full Width">↔W</button>
                <button id="btn-full-height" title="Full Height">↕H</button>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <button id="btn-export" title="Export">Export</button>
                <button id="btn-save" title="Save">Save</button>
                <button id="btn-load" title="Load">Load</button>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group" id="viewport-switcher">
                <button id="btn-bp-desktop" class="active" title="Desktop (full width)" data-bp="desktop">🖥</button>
                <button id="btn-bp-tablet" title="Tablet (768px)" data-bp="tablet">📱</button>
                <button id="btn-bp-mobile" title="Mobile (375px)" data-bp="mobile">📲</button>
                <span class="viewport-label" id="viewport-label">Desktop</span>
            </div>
            <span class="coords-display" id="coords-display">X: 0 Y: 0</span>
        </div>

        <!-- Page Tab Bar -->
        <div id="page-tab-bar"></div>

        <!-- Main area -->
        <div class="editor-main">
            <!-- Left Panel: Properties -->
            <div class="panel-left" id="panel-left">
                <div class="panel-section">
                    <div class="panel-section-header">
                        Properties
                        <span class="arrow">▼</span>
                    </div>
                </div>
                <!-- Property panel content sẽ được render bởi JS -->
            </div>

            <!-- Canvas -->
            <div class="canvas-wrapper" id="canvas-wrapper">
                <div class="canvas-container" id="canvas-container">
                    <div class="canvas show-grid" id="canvas">
                        <!-- Elements sẽ được thêm vào đây -->
                    </div>
                </div>
                <!-- Overlay layer -->
                <div class="overlay-layer" id="overlay-layer"></div>
            </div>

            <!-- Right Panel: Elements + Layers -->
            <div class="panel-right" id="panel-right">
                <div class="panel-tabs">
                    <div class="panel-tab active" data-tab="elements">Elements</div>
                    <div class="panel-tab" data-tab="templates">Templates</div>
                    <div class="panel-tab" data-tab="layers">Layers</div>
                    <div class="panel-tab" data-tab="theme">Theme</div>
                </div>
                <div class="panel-tab-content active" data-tab-content="elements">
                    <!-- Element library content sẽ được render bởi JS -->
                </div>
                <div class="panel-tab-content" data-tab-content="templates">
                    <!-- Template library sẽ được render bởi JS -->
                </div>
                <div class="panel-tab-content" data-tab-content="layers">
                    <!-- Layer panel content sẽ được render bởi JS -->
                </div>
                <div class="panel-tab-content" data-tab-content="theme">
                    <!-- Theme manager sẽ được render bởi JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="context-menu"></div>

    <!-- Main entry point -->
    <script type="module" src="js/editor.js"></script>
</body>
</html>
